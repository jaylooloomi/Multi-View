<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Multi-View</title>
    <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="topbar-left">
                <span class="app-logo">&#9654;</span>
                <span class="app-title">Multi-View</span>
                <div class="layout-switcher">
                    <button id="layout-2x2" class="btn-layout active">2&times;2</button>
                    <button id="layout-3x3" class="btn-layout">3&times;3</button>
                    <button id="layout-4x4" class="btn-layout">4&times;4</button>
                    <button id="layout-5x5" class="btn-layout">5&times;5</button>
                </div>
                <button id="btn-copy-urls" class="btn-paste">複製</button>
                <button id="btn-paste-urls" class="btn-paste">貼上</button>
                <button id="btn-compact" class="btn-paste">重排</button>
                <button id="btn-save-quick" class="btn-paste">儲存</button>
                <button id="btn-pause-all" class="btn-paste">⏸ 暫停</button>
                <button id="btn-resume-all" class="btn-paste">&#9654; 繼續</button>
                <button id="btn-mute-all" class="btn-paste">🔇 靜音</button>
                <button id="btn-unmute-all" class="btn-paste">🔊 取消靜音</button>
            </div>
            <div class="topbar-right">
                <button id="btn-save-group" class="btn-memory">&#35352;&#24698;</button>
                <button id="btn-clear-all" class="btn-clear">&#28165;&#31354;</button>
            </div>
        </header>
        <div id="groups-bar" class="groups-bar" style="display:none"></div>

        <div id="video-grid" class="video-grid count-4">

            <!-- Screen 1 -->
            <div class="screen-card" id="wrapper1">
                <div class="screen-box">
                    <iframe id="screen1" src="about:blank" allow="autoplay; encrypted-media; fullscreen"></iframe>
                    <div class="screen-placeholder" id="placeholder1">
                        <button class="plus-circle" data-frame="1">+</button>
                        <span class="cell-label">&#26684; 1</span>
                    </div>
                    <div class="input-overlay" id="input-overlay1">
                        <div class="input-box">
                            <input type="text" id="url1" class="url-input" placeholder="&#36149;&#19978; URL &#25110;&#24433;&#29255; ID">
                            <div class="overlay-btns">
                                <button class="btn-go load-btn" data-frame="1">播放</button>
                                <button class="btn-overlay-cancel cancel-btn" data-frame="1">取消</button>
                            </div>
                        </div>
                    </div>
                    <div class="hover-controls">
                        <button class="btn-ctrl play-btn" data-frame="1" title="Play">&#9654;</button>
                        <button class="btn-ctrl pause-btn" data-frame="1" title="Pause">&#9646;&#9646;</button>
                        <button class="btn-ctrl reload-btn" data-frame="1" title="Reload">&#8635;</button>
                        <button class="btn-ctrl stop-btn" data-frame="1" title="Stop">&#9632;</button>
                        <button class="btn-ctrl skip-btn" data-frame="1" title="Next">&#9197;</button>

                </div>
            </div>
